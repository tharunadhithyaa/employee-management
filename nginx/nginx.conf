# ============================================================
# Nginx Reverse Proxy Configuration
# ============================================================
#
# This Nginx instance acts as the SINGLE entry point (port 80).
# It routes traffic based on the URL path:
#
#   /           → frontend container (static HTML/CSS/JS)
#   /api/       → backend container (Node.js/Express REST API)
#
# This is a common production pattern: one public-facing port,
# internal services hidden behind the reverse proxy.
# ============================================================

# Run Nginx with a single worker (sufficient for a demo)
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Include the default MIME type mappings
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ---- The main server block ----
    server {
        # Listen on port 80 (the only exposed port)
        listen 80;
        server_name localhost;

        # ----------------------------------------------------------
        # Route 1: /api/* → Backend (Node.js on port 5000)
        # ----------------------------------------------------------
        # Any request starting with /api/ is forwarded to the
        # backend container. Docker Compose's internal DNS resolves
        # "backend" to the correct container IP.
        location /api/ {
            proxy_pass         http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------
        # Route 2: / → Frontend (static files served by Nginx)
        # ----------------------------------------------------------
        # Everything else is served from the frontend container.
        # We use proxy_pass to the internal frontend Nginx container.
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
