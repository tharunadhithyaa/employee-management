# ============================================================
# Docker Compose — Employee Management System
# ============================================================
#
# This file defines ALL the services needed to run the app:
#
#   1. mongodb   — Database (MongoDB 6)
#   2. backend   — REST API (Node.js/Express)
#   3. frontend  — Static site (Nginx serving HTML/CSS/JS)
#   4. nginx     — Reverse proxy (only port 80 exposed)
#
# Usage:
#   docker compose up --build        (start everything)
#   docker compose down              (stop everything)
#   docker compose logs -f backend   (tail backend logs)
#
# ============================================================

version: '3.8'

services:

  # ---- MongoDB Database ----
  # Official MongoDB image. Data is persisted using a named volume
  # so it survives container restarts.
  mongodb:
    image: mongo:6
    container_name: ems-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"       # Expose for local debugging (optional)
    volumes:
      - mongo-data:/data/db # Persist data across restarts
    networks:
      - ems-network

  # ---- Backend API (Node.js + Express) ----
  # Builds from the ./backend directory.
  # Depends on MongoDB being available first.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/employeedb
    depends_on:
      - mongodb
    networks:
      - ems-network

  # ---- Frontend (Nginx serving static files) ----
  # Builds from the ./frontend directory.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ems-frontend
    restart: unless-stopped
    networks:
      - ems-network

  # ---- Nginx Reverse Proxy ----
  # The ONLY service that exposes a port to the host machine.
  # Routes:
  #   /     → frontend:80
  #   /api  → backend:5000
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ems-nginx
    restart: unless-stopped
    ports:
      - "80:80"             # The single entry point
    depends_on:
      - frontend
      - backend
    networks:
      - ems-network


# ---- Shared Network ----
# All services communicate over this internal bridge network.
# Docker's built-in DNS lets them find each other by service name.
networks:
  ems-network:
    driver: bridge

# ---- Persistent Volume ----
# Stores MongoDB data so it isn't lost when containers restart.
volumes:
  mongo-data:
    driver: local
